trainer:
  strategy: ddp_find_unused_parameters_true
  precision: bf16-mixed
  max_epochs: 1
  gradient_clip_val: 0.0
  log_every_n_steps: 1
  check_val_every_n_epoch: 1
  val_check_interval: 1
  enable_checkpointing: true

random_seed: 42
num_sanity_val_steps: 0

batch_size_per_gpu: 4
epoch_steps: 8